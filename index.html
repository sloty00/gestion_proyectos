<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #707a82; /* Tu color de fondo base */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
            font-family: sans-serif;
            transition: opacity 1s ease;
        }
        #container {
            text-align: center;
        }
        #progress-bar {
            width: 300px;
            height: 10px;
            background-color: #34495e;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }
        #fill {
            height: 100%;
            width: 0%;
            background-color: #00bcd4; /* Tu color cian distintivo */
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="container">
        <h2>Iniciando Sistema...</h2>
        <div id="progress-bar"><div id="fill"></div></div>
        <p id="percentage">0%</p>
    </div>

    <script>
        let width = 0;
        const fill = document.getElementById('fill');
        const text = document.getElementById('percentage');
        
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                // "Puerta que se abre": efecto de desvanecimiento
                document.body.style.opacity = "0";
                setTimeout(() => {
                    window.location.href = './public/index.html';
                }, 1000);
            } else {
                width++;
                fill.style.width = width + '%';
                text.innerText = width + '%';
            }
        }, 1); // Ajusta este valor para que sea más lento o rápido
    </script>
</body>
</html>
