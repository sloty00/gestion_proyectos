<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyectos</title>
    <!-- CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Enlace a tu archivo CSS personalizado -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste para los botones de eliminar para que se vean alineados */
        .btn-danger {
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="bg-secondary text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="images/devnod_logo.png" alt="Devnod Logo" style="height: 50px; width: auto;">
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-info fw-bold" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-info ms-lg-3" data-bs-toggle="modal" data-bs-target="#modalAcercaDe">
                            Acerca de
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Mis Proyectos</h2>

        <!-- Formulario para nuevo proyecto -->
        <div class="card p-4 mb-4 bg-dark text-white border-0 shadow">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="nombreProyecto" class="form-control" placeholder="Nombre del proyecto">
                </div>
                <div class="col-md-3">
                    <input type="date" id="fechaInicio" class="form-control" title="Fecha de inicio">
                </div>
                <div class="col-md-3">
                    <input type="date" id="fechaFin" class="form-control" title="Fecha de fin proyectado">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="guardarProyecto()">Crear</button>
                </div>
            </div>
        </div>

        <!-- Contenedor de Proyectos -->
        <div id="proyectos-container" class="d-flex flex-column gap-4 w-100">
            <!-- Aquí se cargarán los proyectos mediante JS -->
        </div>
    </div>

    <!-- Modal de Edición -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Editar Tarea</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-pId">
                    <input type="hidden" id="edit-fId">
                    <input type="hidden" id="edit-tId">
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" id="edit-desc" class="form-control bg-secondary text-white border-0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Horas</label>
                        <input type="number" id="edit-horas" class="form-control bg-secondary text-white border-0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select id="edit-estado" class="form-select bg-secondary text-white border-0">
                            <option value="En Proceso">En Proceso</option>
                            <option value="COMPLETADA">COMPLETADA</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarEdicion()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Acerca De -->
    <div class="modal fade" id="modalAcercaDe" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-info">Acerca de DEVNOD-INC</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Somos expertos en soluciones de desarrollo y sistemas, optimizando flujos de trabajo con tecnología de vanguardia.</p>
                    <p><small class="text-secondary">Versión 1.0.0</small></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
